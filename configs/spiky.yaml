device: auto
seed: 7
target_frames: 128
batch_size: 16
num_workers: 4
max_epochs: 100
min_epochs: 10

model:
  latent_dim: 128
  encoder_channels: [32, 64]
  num_steps: 8
  beta: 0.95
  threshold: 1.0
  reset_mechanism: subtract
  sparse_lambda: 0.001
  target_sparsity: 0.05
  sparse_penalty: kl

optimizer:
  muon_lr: 0.02
  muon_momentum: 0.95
  muon_weight_decay: 0.0
  aux_lr: 0.0003
  aux_betas: [0.9, 0.95]
  aux_eps: 1.0e-10
  aux_weight_decay: 0.0

early_stopping:
  method: generalization_loss
  generalization_loss_threshold: 2.0
  embedding_subset_fraction: 0.15
  embedding_subset_min_size: 128
  cosine_change_threshold: 1.0
